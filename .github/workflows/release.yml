name: Publish release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v6

      - name: Verify tag and repository version
        shell: bash
        run: |
          set -euo pipefail
          test "${GITHUB_REF_NAME}" = "v$(cat VERSION)"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install Python implementation
        run: python -m pip install -e .

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Run release bar
        run: |
          python -m unittest discover -s tests -v
          python conformance/generate_fixtures.py --check
          npm ci
          npm test
          python scripts/check_release.py

      - name: Publish or complete GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release edit "${GITHUB_REF_NAME}" --draft=false
          else
            gh release create "${GITHUB_REF_NAME}" --generate-notes --title "${GITHUB_REF_NAME}"
          fi

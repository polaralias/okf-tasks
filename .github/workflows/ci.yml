name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  release-gate:
    name: release-gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: python -m pip install PyYAML "setuptools>=77"

      - name: Test Python producer and validator
        run: python -m unittest discover -s tests -v

      - name: Check generated fixtures
        run: python conformance/generate_fixtures.py --check

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: Install TypeScript implementation
        run: npm ci

      - name: Test independent TypeScript validator
        run: npm test

      - name: Check release identities
        run: python scripts/check_release.py
